<!DOCTYPE html>
<html>

<head>
<title>Atlas AI</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="header">
Atlas AI – Engineering Knowledge Assistant
</div>


<div class="container">

<h2>Upload Document</h2>

<input type="file" id="fileInput">
<button onclick="uploadFile()">Upload</button>

<p id="uploadStatus"></p>


<hr>


<h2>Ask Question</h2>

<input type="text" id="questionBox" placeholder="Ask about uploaded documents...">

<button onclick="askQuestion()">Ask</button>


<h3>Answer</h3>

<div id="answerBox"></div>


<h3>Sources</h3>

<div id="sourcesBox"></div>

</div>


<script>

async function uploadFile() {

    let file = document.getElementById("fileInput").files[0]

    if (!file) {
        alert("Select a file")
        return
    }

    let formData = new FormData()

    formData.append("file", file)

    document.getElementById("uploadStatus").innerText = "Uploading..."

    let response = await fetch("/documents/upload", {
        method: "POST",
        body: formData
    })

    let result = await response.json()

    document.getElementById("uploadStatus").innerText =
        "Indexed: " + file.name
}


async function askQuestion() {

    let question = document.getElementById("questionBox").value

    if (!question) {
        alert("Enter a question")
        return
    }

    document.getElementById("answerBox").innerText = "Thinking..."

    let response = await fetch("/query", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            question: question
        })
    })

    let result = await response.json()

    document.getElementById("answerBox").innerText = result.answer

    let sourcesHTML = ""

    for (let s of result.sources) {

        sourcesHTML +=
            "<div class='source'>" +
            "<b>" + s.document + "</b><br>" +
            s.text +
            "</div>"
    }

    document.getElementById("sourcesBox").innerHTML = sourcesHTML
}

</script>

</body>

</html>
