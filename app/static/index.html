<!DOCTYPE html>
<html>

<head>

<title>Atlas AI</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="header">
Atlas AI – Engineering Knowledge Assistant
</div>

<div class="upload">

<input type="file" id="fileInput">

<button onclick="uploadFile()">Upload</button>

<span id="uploadStatus"></span>

</div>

<div class="chat-container">

<div id="chat" class="chat"></div>

</div>

<div class="input-container">

<div class="input-wrapper">

<input
id="questionBox"
placeholder="Ask something about your documents..."
onkeypress="if(event.key==='Enter'){askQuestion()}"
>

<button onclick="askQuestion()">Send</button>

</div>

</div>

<script>

function addMessage(text,type,sources){

    let chat = document.getElementById("chat")

    let msg = document.createElement("div")

    msg.className = "message " + type

    let bubble = document.createElement("div")

    bubble.className = "bubble"

    bubble.innerText = text

    if(sources){

        let src = document.createElement("div")

        src.className="sources"

        let html="<b>Sources</b><br>"

        for(let s of sources){

            html += s.document + "<br>"

        }

        src.innerHTML=html

        bubble.appendChild(src)
    }

    msg.appendChild(bubble)

    chat.appendChild(msg)

    chat.scrollTop = chat.scrollHeight
}



async function uploadFile(){

    let file=document.getElementById("fileInput").files[0]

    if(!file){
        alert("Select a file")
        return
    }

    let formData=new FormData()

    formData.append("file",file)

    document.getElementById("uploadStatus").innerText="Indexing..."

    let response=await fetch("/documents/upload",{
        method:"POST",
        body:formData
    })

    await response.json()

    document.getElementById("uploadStatus").innerText="Indexed: "+file.name
}



async function askQuestion(){

    let input=document.getElementById("questionBox")

    let question=input.value.trim()

    if(!question) return

    addMessage(question,"user")

    input.value=""

    addMessage("Thinking...","ai")

    let response=await fetch("/query",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({
            question:question
        })

    })

    let result=await response.json()

    let chat=document.getElementById("chat")

    chat.removeChild(chat.lastChild)

    addMessage(result.answer,"ai",result.sources)
}

</script>

</body>

</html>
