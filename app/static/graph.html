<!DOCTYPE html>
<html>

<head>

<title>Knowledge Graph</title>

<script src="https://unpkg.com/cytoscape/dist/cytoscape.min.js"></script>

<style>

body {
  font-family: Arial;
}

#graph {
  width: 100%;
  height: 90vh;
  border: 1px solid #ccc;
}

</style>

</head>

<body>

<h2>Knowledge Graph</h2>

<div id="graph"></div>

<script>

fetch("/graph")
.then(res => res.json())
.then(data => {

  const elements = [
    ...data.nodes,
    ...data.edges
  ];

  const cy = cytoscape({

    container: document.getElementById("graph"),

    elements: elements,

    style: [

      {
        selector: "node",
        style: {
          "background-color": "#0074D9",
          "label": "data(id)",
          "text-valign": "center",
          "color": "#fff"
        }
      },

      {
        selector: "edge",
        style: {
          "width": 2,
          "line-color": "#aaa",
          "target-arrow-color": "#aaa",
          "target-arrow-shape": "triangle",
          "curve-style": "bezier",
          "label": "data(label)"
        }
      }

    ],

    layout: {
      name: "cose"
    }

  });

});

</script>

</body>

</html>
